name: E2E (Playwright)

# Job opcional: roda os specs públicos sempre; specs autenticados só se
# E2E_USER_EMAIL/E2E_USER_PASSWORD estiverem configurados como secrets do repo.
# Artefatos (relatório HTML, screenshots, vídeos, traces) são publicados.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      # Auditoria: garante que docs/E2E_SMOKE_COVERAGE.md está em dia com
      # _catalog.ts + SMOKE_COVERAGE. Falha se alguém alterou a suíte sem
      # regenerar o doc (`npm run e2e:smoke-coverage-doc`).
      - name: Validar doc de auditoria do smoke (drift check)
        run: node scripts/e2e-smoke-coverage-doc.mjs --check

      - name: Run E2E smoke (gate determinístico — 1 teste/feature, sequencial)
        id: e2e_smoke
        run: npx playwright test --project=chromium-smoke --max-failures=3
        continue-on-error: true

      # Resumo dedicado do smoke: 1 linha por funcionalidade no log do step,
      # `::error file=...::` por falha (anotação inline no PR), `::group::`
      # colapsável para diagnóstico, e bloco "FINAL SUMMARY" sem ANSI no fim.
      - name: Generate SMOKE summary (sempre — log final + annotations)
        if: always()
        run: node scripts/e2e-smoke-summary.mjs || true

      - name: Append SMOKE summary to GitHub UI
        if: always() && hashFiles('playwright-report/smoke-summary.md') != ''
        run: |
          {
            echo "## 🚦 E2E Smoke Summary"
            echo ""
            cat playwright-report/smoke-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail-fast se smoke falhou (gate)
        if: steps.e2e_smoke.outcome != 'success'
        run: |
          echo "::error::Smoke gate falhou — veja '🚦 E2E Smoke Summary' acima e artifact 'playwright-report'"
          exit 1

      - name: Run E2E full (cobertura completa)
        if: steps.e2e_smoke.outcome == 'success'
        run: npx playwright test
        continue-on-error: true
        id: e2e_run

      - name: Generate feature summary
        if: always()
        run: node scripts/e2e-feature-summary.mjs || true

      - name: Append feature summary to GitHub UI
        if: always() && hashFiles('playwright-report/feature-summary.md') != ''
        run: |
          {
            echo "## E2E Feature Summary"
            echo ""
            cat playwright-report/feature-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Upload smoke summary (markdown + json)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-summary
          path: |
            playwright-report/smoke-summary.md
            playwright-report/smoke-summary.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload feature summary (markdown)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-feature-summary
          path: playwright-report/feature-summary.md
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-evidence
          path: |
            e2e-artifacts
            test-results
          retention-days: 7

      - name: Fail job if tests failed
        if: steps.e2e_smoke.outcome == 'failure' || steps.e2e_run.outcome == 'failure'
        run: |
          echo "::error::Playwright tests failed — veja artifacts 'playwright-report' e 'e2e-feature-summary'"
          exit 1
