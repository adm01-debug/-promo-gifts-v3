name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run TypeScript compiler
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: false

  solution-build:
    name: Project References Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: .tsbuild
          key: tsbuild-${{ runner.os }}-${{ hashFiles('**/tsconfig*.json') }}
          restore-keys: |
            tsbuild-${{ runner.os }}-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run solution build (tsc -b)
        run: npx tsc -b --verbose
        continue-on-error: false

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  config-check:
    name: Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Validate package.json syntax
        run: |
          echo "Checking package.json..."
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"
          echo "✅ package.json is valid JSON"
      
      - name: Check required scripts exist
        run: |
          node -e "
            const pkg = require('./package.json');
            const required = ['dev', 'build', 'preview', 'test', 'test:coverage'];
            const missing = required.filter(s => !pkg.scripts[s]);
            if (missing.length) {
              console.error('Missing scripts:', missing.join(', '));
              process.exit(1);
            }
            console.log('✅ All required scripts present');
          "
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate tsconfig files
        run: |
          echo "Checking tsconfig.json..."
          npx tsc --showConfig --project tsconfig.json > /dev/null
          echo "✅ tsconfig.json is valid"
          
          echo "Checking tsconfig.app.json..."
          npx tsc --showConfig --project tsconfig.app.json > /dev/null
          echo "✅ tsconfig.app.json is valid"
      
      - name: Validate Vite config
        run: |
          echo "Checking vite.config.ts..."
          npx vite build --mode development --dry-run 2>/dev/null || true
          echo "✅ Vite config validated"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests with coverage
        run: npm test -- --coverage --passWithNoTests
        continue-on-error: false
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
      
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | jq -r '.total | "- Lines: \(.lines.pct)%\n- Statements: \(.statements.pct)%\n- Functions: \(.functions.pct)%\n- Branches: \(.branches.pct)%"' >> $GITHUB_STEP_SUMMARY
          fi
