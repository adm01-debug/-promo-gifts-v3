name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke tests (rotas + health-check)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run smoke tests
        env:
          SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL || 'https://promogifts.com.br' }}
          SMOKE_HEALTH_FN_URL: ${{ secrets.SMOKE_HEALTH_FN_URL }}
          SMOKE_TIMEOUT_MS: '5000'
          SMOKE_FAIL_ON_DEGRADED: '0'
        run: node scripts/smoke-tests.mjs

  quality:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint Check
        run: npm run lint:baseline

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Build Check
        run: npm run build

      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

      - name: Check global coverage floor
        run: node scripts/check-global-coverage.mjs

      - name: Upload coverage artifacts (JSON/HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e-tests:
    name: Playwright E2E Regression
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E Regression
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          E2E_BASE_URL: http://localhost:5173
        run: npm run test:e2e:regression

      - name: Generate E2E Feature Summary Report
        if: always()
        run: node scripts/e2e-feature-summary.mjs

      - name: Check per-route quality gate
        run: node scripts/check-route-quality.mjs

      - name: Upload Playwright Reports (HTML/JSON/Markdown)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            playwright-report/feature-summary.md
            playwright-report/feature-summary.json
          retention-days: 14


  edge-functions:
    name: Edge Functions Validation
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck Edge Functions
        run: node scripts/typecheck-edge-functions.mjs

  theme-and-a11y:
    name: Theme & Accessibility Gate
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Theme Validation
        run: npm run test:theme-validation

      - name: Upload Theme Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: theme-validation-report
          path: playwright-report/
          retention-days: 14



