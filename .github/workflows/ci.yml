name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . --max-warnings=500

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Security audit
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: RLS policy tests (optional)
        if: env.TEST_SELLER_PASSWORD != '' && env.TEST_ADMIN_PASSWORD != ''
        env:
          TEST_SELLER_PASSWORD: ${{ secrets.TEST_SELLER_PASSWORD }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npx vitest run tests/rls/ --reporter=verbose
        continue-on-error: true

  hooks-tests:
    name: Hook tests (smoke + funcionais)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Smoke primeiro: falha rápido se algum hook não monta sequer com providers padrão.
      - name: Smoke tests (hooks)
        run: npx vitest run "tests/hooks/**/*-smoke.test.*" --reporter=verbose

      # Suíte funcional completa de hooks (separada do job principal para visibilidade dedicada no PR).
      - name: Hook test suite (funcionais)
        run: npx vitest run tests/hooks/ --reporter=verbose

      - name: Hook coverage report
        run: npx vitest run tests/hooks/ --coverage --coverage.reporter=text --coverage.reporter=json-summary
        continue-on-error: true

      - name: Upload hook coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hooks-coverage
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

  price-freshness-tests:
    name: Price Freshness — testes + gate de cobertura
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Roda APENAS os testes de price freshness (utils + componente).
      # Falha rápido se algum cenário pt-BR/threshold/timezone regredir.
      # Bash expande os globs em paths reais antes de chamar o Vitest
      # (passar "glob" entre aspas faz o Vitest tratar como literal e não achar nada).
      - name: Run price freshness suite
        shell: bash
        run: |
          set -euo pipefail
          files=( tests/utils/price-freshness*.test.ts tests/components/PriceFreshnessBadge*.test.tsx )
          echo "Arquivos detectados:"
          printf '  - %s\n' "${files[@]}"
          npx vitest run "${files[@]}" --reporter=verbose

      # Gera coverage focado nos arquivos de price freshness para alimentar o gate.
      # --coverage.include isola o cálculo: mudanças em arquivos não-relacionados
      # não afetam este job.
      - name: Coverage (price freshness only)
        shell: bash
        run: |
          set -euo pipefail
          files=( tests/utils/price-freshness*.test.ts tests/components/PriceFreshnessBadge*.test.tsx )
          npx vitest run "${files[@]}" \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=json-summary \
            --coverage.reporter=html \
            --coverage.include='src/utils/price-freshness.ts' \
            --coverage.include='src/components/products/PriceFreshnessBadge.tsx'

      # Gate por arquivo: falha se qualquer arquivo monitorado cair do piso atual.
      - name: Enforce per-file coverage floor (anti-regressão)
        run: node scripts/check-price-freshness-coverage.mjs

      - name: Upload price-freshness coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-freshness-coverage
          path: coverage/
          retention-days: 30
          if-no-files-found: ignore
