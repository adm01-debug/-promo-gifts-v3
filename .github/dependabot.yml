version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group all minor/patch updates together to reduce PR noise
      production-minor:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # React majors require manual coordination
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Tailwind v4 requires migration
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # Supabase types are auto-generated — don't touch
      - dependency-name: "@supabase/supabase-js"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci(actions)"
